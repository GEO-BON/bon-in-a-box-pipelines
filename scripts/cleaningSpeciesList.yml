script: cleaningSpeciesList.py
name: Cleaning raw data to get a list of pollinator species
description: This script processes raw interaction data from GloBI to remove non-pollinators, invalid names, and fix any formatting discrepencies.
author:
  - name: Joannie Lao

inputs:
  pollinator_parquet:
    label: Pollinator interactions parquet
    description: Path to the intermediate Parquet file generated by the extraction script.
    type: application/x-parquet

outputs:
  taxa:
    label: Taxa list
    description: >
      Cleaned array of pollinator scientific names. 
    type: text[]
    example: [Apis mellifera, Bombus terrestris]

conda:
  channels:
    - conda-forge
  dependencies:
    - pandas
    - pyarrow