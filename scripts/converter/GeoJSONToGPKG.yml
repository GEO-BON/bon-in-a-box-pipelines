script: geoJSONToGPKG.py
name: GeoJSON to GeoPackage
description: This script converts a GeoJSON file to GeoPackage file.
author:
  - name: Laetitia Tremblay
    identifier: https://www.linkedin.com/in/laetitia-tremblay-b0619b273/
inputs:
  geojson_file:
    label: GeoJSON file
    description: GeoJSON file.
    type: application/geo+json
    example: null
outputs:
  gpkg_file:
    label: GeoPackage file
    description: GeoPackage file.
    type: application/geopackage+sqlite3
    example: null
conda:
  channels:
    - conda-forge
  dependencies:
    - geopandas