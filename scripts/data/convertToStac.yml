script: convertToStac.py
name: TIFF to STAC Item
description: Converts a GeoTIFF file into a STAC item
author:
  - name: Laetitia Tremblay
    email: laetitia.tremblay@mcgill.ca
lifecycle:
  status: In development
inputs:
  tiff:
    label: GeoTIFF file
    description: Input GeoTIFF to convert to a STAC item
    type: image/tiff;application=geotiff
    example: null
outputs:
  stac_item:
    label: STAC Item
    description: STAC item JSON describing the GeoTIFF
    type: application/json
conda:
  channels:
    - conda-forge
  dependencies:
    - pystac
    - rasterio
    - shapely
