script: getGBIFObservations.py
name: GBIF Observations from Download API
description: Load complete GBIF data from GBIF download API
author:
  - name: Guillaume Larocque
    identifier: https://orcid.org/0000-0002-5967-9156
lifecycle:
  status: core

inputs:
  taxa:
    description: Comma-separated list of [taxa](https://en.wikipedia.org/wiki/Taxon). Each value could be a species name, order, class, genus, kingdom or family, as long as it is an exact match with the GBIF taxonomic backbone. Individual species can be looked up [on the GBIF website](https://www.gbif.org/species/).
    label: Taxa list
    type: text[]
    example: [Acer saccharum, Acer nigrum]
  bbox_crs:
    description: Select a bounding box and CRS. This defines the geographic extent of the analysis as a bounding box, along with its coordinate reference system (CRS). A larger extent increases computation time.
    label: Bounding box and CRS
    type: bboxCRS
    example:
  min_year:
    description: Earliest year for GBIF records. Accepts YYYY or YYYY-MM-DD; if a full date is supplied, only the year is used.
    label: Minimum year or start date
    type: text
    example: "2010"
  max_year:
    description: Latest year for GBIF records. Accepts YYYY or YYYY-MM-DD; if a full date is supplied, only the year is used.
    label: Maximum year or end date
    type: text
    example: "2024"
outputs:
  observations_file:
    label: Observations
    description: Tab-separated file containing all GBIF occurrence records retrieved for the specified taxa, bounding box, and time range. Each row represents one observation. Used as input to subsequent modeling steps.
    type: text/tab-separated-values
    example: hfn7s62sq.csv
  total_records:
    label: Total number of occurrences
    description: Count of occurrence records returned by the GBIF query. Use this to gauge data availability before running the model — very low counts (e.g. <20) may produce unreliable results.
    type: int
    example: 1234
  gbif_doi:
    label: DOI of GBIF download
    description: A permanent DOI assigned to this specific GBIF data download. Must be cited in any publication using these data — see [GBIF's citation guidelines](https://www.gbif.org/citation-guidelines).
    type: text
    example: 10.15468/dl.j644h5
conda:
  channels:
    - conda-forge
  dependencies:
    - pygbif
    - pandas
    - pyproj
