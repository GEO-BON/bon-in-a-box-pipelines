script: summariseLAI.py
name: Summarise Lead Area Index (LAI)
author:
  - name: Samara Manzin
    email: samara.manzin@mcgill.ca
    identifier: https://orcid.org/0009-0005-9134-9981
license: CC BY
description: |
    This script calculates and summarizes the LAI for every pixel within a given region and for a selected
    time period. The data is pulled using the OpenEO Python client connected to the Copernicus Data Space Ecosystem backend. The resulting
    raster will give you the maximum LAI in each pixel of a given region. You can read more about the LAI layers [here](https://algorithm-catalogue.apex.esa.int/apps/biopar#biophysical-parameters)."
inputs:
  bbox_crs:
    label: Bounding box and CRS
    description: Object containing the chosen bounding box and CRS.
    type: bboxCRS
    example:
  study_area_polygon:
    label: Polygon of study area
    description: Polygon of the study area of interest. Leave blank if you do not want to crop by a polygon and want to use the bounding box instead.
    type: application/geopackage+sqlite3
    example: null
  start_year:
    label: Start year
    description: Start date for LAI time series.
    type: text
    example: "2017"
  end_year:
    label: End year
    description: End date for LAI time series.
    type: text
    example: "2024"
  spatial_resolution:
    label: Spatial resolution
    description: Spatial resolution, in meters, of the raster for plotting, leave blank to have the original spatial resolution of the layer (10m x 10m).
    type: float
    example: 1000
outputs:
  rasters:
    label: LAI rasters
    description: |
      Rasters of LAI layers, with one raster taken as the max LAI values over the period of interest.
      Will either be the raw raster layers or resampled to the spatial resolution input by the user.
    type: image/tiff;application=geotiff[]
conda:
  channels:
    - conda-forge
  dependencies:
    - openeo
    - pandas
    - geopandas
    - shapely