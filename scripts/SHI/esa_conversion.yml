script: esa_conversion.R
name: Convert IUCN habitat types to ESA landcover codes
description: This script converts IUCN habitat types to ESA landcover codes.
author:
  - name: Samara Manzin
    identifier: null
inputs:
  species:
    label: Species
    description: Scientific name of the species. Multiple species names can be specified, separated with a comma.
    type: text[]
    example: ["Alces alces", "Lynx lynx"]
  conversion_table:
    label: Conversion Table
    description: CSV file containing the conversion table from IUCN to ESA habitat codes.
    type: text/csv
    example: null
outputs:
  habitats:
    label: Habitats
    description: A CSV file containing the ESA landcover codes for each species
    type: text/csv