script: summarise_layers.R
name: Summarise Layers
author:
  - name: Samara Manzin
    email: samara.manzin@mcgill.ca
    identifier: https://orcid.org/0009-0005-9134-9981
license: CC BY
description: |
    This script summarizes multiple time series layers through space and time for a selected spatial resolution and time period using the specified aggregation methods. The resulting
    output will give you a spatially aggregated and temporally averaged layer. 
inputs:
  layers:
    label: layers
    description: Object containing the raster layers.
    type: image/tiff;application=geotiff[]
    example:
  bbox_crs:
    label: Bounding box and CRS
    description: Object containing the chosen bounding box and CRS.
    type: bboxCRS
    example:
  start_year:
    label: Start year
    description: Start date for time series.
    type: text
    example: "2017"
  end_year:
    label: End year
    description: End date for time series.
    type: text
    example: "2024"
  spatial_resolution:
    label: Spatial resolution
    description: Spatial resolution, in meters, of the raster for plotting, leave blank to have the original spatial resolution of the layer (10m x 10m).
    type: float
    example: 1000
  spatial_aggregation_method:
    label: Spatial aggregation method
    description: Method to use for spatial aggregation of the raster layers. Options are "mean", "median", "max", "min", "sum", "first", "last".
    type: options
    options:
      - mean
      - median
      - max
      - min
      - sum
      - first
      - last
    example: min
  temporal_aggregation_method:
    label: Temporal aggregation method
    description: Method to use for temporal aggregation of the raster layers. Options are "mean", "median", "max", "min", "sum", "first", "last".
    type: options
    options:
      - mean
      - median
      - max
      - min
      - sum
      - first
      - last
    example: mean
  bands:
    label: Bands
    description: Bands to use for the aggregation. 
    type: text
    example: "LAI"
outputs:
  rasters:
    label: summarised rasters
    description: |
      The output will be a single raster layer that is the result of the spatial and temporal aggregation of the input layers. The output will be in GeoTIFF format.
    type: image/tiff;application=geotiff[]
conda:
  channels:
    - conda-forge
    - r
  dependencies:
    - r-rjson
    - r-gdalcubes=0.7.1
    - r-terra
    - r-sf
