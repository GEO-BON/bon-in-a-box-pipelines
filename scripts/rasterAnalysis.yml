script: rasterAnalysis.py
name: Raster-based pollinator analysis
description: >
  Compares observation heatmap raster against the ARIES pollinator occurrence raster. Runs correlation analysis, residual mapping, gap analysis, binary agreement (confusion matrix / kappa), ROC/AUC, and hotspot overlap. All analyses are purely raster-based with no occurrence point data required.
author:
  - name: Joannie Lao

inputs:
  heatmap_raster:
    label: Observation heatmap
    description: GeoTIFF heatmap of pollinator observations from the Quebec Atlas pipeline
    type: image/tiff;application=geotiff
    example: observations_heatmap.tif
  pollinator_raster:
    label: ARIES pollinator occurrence raster
    description: GeoTIFF raster produced by the ARIES for SEEA script
    type: image/tiff;application=geotiff
    example: occurrence_of_agriculture-Pollinator_biology-Insect.tif
  high_aries_threshold:
    label: High ARIES value threshold
    description: >
      ARIES values above this are considered high-occurrence for binary analyses. Between 0 and 1.
    type: float
    example: 0.6
  high_heat_threshold:
    label: High heatmap value threshold
    description: >
      Normalised heatmap values above this are considered high-density for binary analyses. Between 0 and 1.
    type: float
    example: 0.6

outputs:
  residual_raster:
    label: Residual raster
    description: GeoTIFF of ARIES minus normalised heatmap per cell
    type: image/tiff;application=geotiff
  gap_raster:
    label: Gap analysis raster
    description: GeoTIFF marking cells with high ARIES value but low heatmap density
    type: image/tiff;application=geotiff
  plot_correlation:
    label: Correlation plot
    description: Scatter and 2D density of ARIES vs heatmap values
    type: image/png
  plot_residual:
    label: Residual map plot
    description: Map showing where ARIES over- and underpredicts relative to heatmap
    type: image/png
  plot_gap_analysis:
    label: Gap analysis map
    description: Three-panel map of ARIES raster, heatmap, and gap cells
    type: image/png
  plot_confusion:
    label: Confusion matrix plot
    description: Binary agreement between ARIES and heatmap with kappa score
    type: image/png
  plot_roc:
    label: ROC curve plot
    description: ROC/AUC treating heatmap as ground truth and ARIES as predictor
    type: image/png
  plot_hotspot:
    label: Hotspot overlap map
    description: Four-class map showing agreement and disagreement between hotspots
    type: image/png
  
conda:
  channels: [conda-forge]
  dependencies:
    - python=3.12
    - pip
    - pip:
        - numpy
        - pandas
        - pyarrow
        - geopandas
        - rasterio
        - matplotlib
        - seaborn
        - scipy
        - scikit-learn