script: standardise_data.R
name: Standardise First Records Data
description: "This script standardises the first records data for a country"
author:
  - name: Samara Manzin
    email: samara.manzin@mcgill.ca
inputs:
  country_name:
    label: Country name
    type: country
    description: Name of the country for which to download the GRIIS checklist.
    example: NULL
  griis_checklist:
    label: GRIIS checklist
    type: text/csv
    description: GRIIS checklist for the specified country.
    example: NULL
  first_records:
    label: First records data
    type: text/csv
    description: First records data for the specified country.
    example: NULL
  checklist_type:
    label: Checklist type
    type: options[]
    options:
      - national
      - protected areas
    description: Type of checklist to download (e.g., 'national' or 'protected areas').
    example: NULL
outputs:
  firstrecords_cleaned:
    label: First Records Cleaned
    description: Cleaned first records data for the specified country.
    type: text/csv
conda:
  channels:
    - conda-forge
    - r
  dependencies:
    - r-jsonlite
    - r-dplyr
    - r-duckdb
    - r-rjson
    - r-stringr