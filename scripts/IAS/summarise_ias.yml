script: summarise_ias.R
name: Summarise IAS data
description: "Summarise merged IAS data and annual GBIF observation counts."
author:
  - name: Samara Manzin
    email: samara.manzin@mcgill.ca
inputs:
  merged_dataset:
    label: Merged IAS dataset
    type: text/csv
    description: Merged IAS dataset produced by the SInAS merge-datasets step.
    example: NULL
  gbif_country_observations:
    label: GBIF country observations
    type: text/csv
    description: CSV containing GBIF occurrence counts per year for the selected country.
    example: NULL
outputs:
  ias_summary:
    label: IAS summary
    description: Summary statistics for the merged IAS dataset.
    type: text/csv
    example: NULL
  ias_annual_summary:
    label: IAS annual summary
    description: Annual table combining GBIF occurrence counts and IAS first-record counts.
    type: text/csv
    example: NULL
  ias_summary_table:
    label: IAS summary table
    description: HTML summary table for the merged IAS dataset.
    type: text/html
    example: NULL
conda:
  channels:
    - conda-forge
    - r
  dependencies:
    - r-dplyr
    - r-gt
    - r-readr
    - r-stringr
    - r-tibble
    - r-tidyr
    - r-rjson
