script: download_firstrecords.R
name: Download First Records Data
description: "This script downloads the first records data for a country"
author:
  - name: Samara Manzin
    email: samara.manzin@mcgill.ca
inputs:
  country_name:
    label: Country name
    type: country
    description: Name of the country for which to download the first records data.
    example: NULL
outputs:
  firstrecords_cleaned:
    label: First Records Cleaned
    description: Cleaned first records data for the specified country.
    type: text/csv
conda:
  channels:
    - conda-forge
    - r
  dependencies:
    - r-jsonlite
    - r-dplyr
    - r-duckdb
    - r-rjson
    - r-stringr
    - r-rgbif