script: run_workflow.R
name: SInAS workflow
description: "This script executes the SInAS workflow for a country to standardise and integrate alien species occurrence data."
author:
  - name: Samara Manzin
    email: samara.manzin@mcgill.ca
inputs:
  country_name:
    label: Country name
    type: country
    description: Name of the country for which to download the GRIIS checklist.
    example: NULL
  griis_checklist:
    label: GRIIS checklist
    type: text/csv
    description: GRIIS checklist for the specified country.
    example: NULL
  first_records:
    label: First Records Data
    type: text/csv
    description: First records data for the specified country.
    example: NULL
outputs:
  integrated_data:
    label: Integrated Data
    description: Integrated dataset combining GRIIS checklist and first records data for the specified country.
    type: text/csv
conda:
  channels:
    - conda-forge
    - r
  dependencies:
    - r-openxlsx
    - r-data.table
    - r-tidyr
    - r-stringr
    - r-stringi
    - r-dplyr