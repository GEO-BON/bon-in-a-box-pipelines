script: createStacCatalog.py
name: TIFF to STAC Catalog
description: Converts a GeoTIFF files into a STAC catalog
author:
  - name: Laetitia Tremblay
    email: laetitia.tremblay@mcgill.ca
lifecycle:
  status: In development
inputs:
  tiff_files:
    label: GeoTIFF files
    description: Input GeoTIFFs to convert to a STAC catalog
    type: image/tiff;application=geotiff[]
    example: null
outputs:
  stac_catalog:
    label: STAC Catalog
    description: STAC catalog JSON created from the GeoTIFFs
    type: application/json
conda:
  channels:
    - conda-forge
  dependencies:
    - pystac
    - gdal
    - jsonschema
