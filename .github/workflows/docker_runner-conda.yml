name: Conda Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - edge
      - '*staging'
    paths:
      - '.github/workflows/docker_runner-conda.yml'
      - 'runners/conda/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: runner-conda

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      repo_slug: ${{ steps.slug.outputs.repo_slug }}
    steps:
      - name: Compute lowercase GHCR slug
        id: slug
        shell: bash
        run: |
          echo "repo_slug=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    env:
      REPO_SLUG: ${{ needs.prepare.outputs.repo_slug }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          # Get base image platforms with
          # docker buildx imagetools inspect condaforge/miniforge3:latest | grep Platform
          # Excluding windows/amd64 for now since we would need a separate builder.
          # Excluding linux/386 since this points to old 32-bit processor machines and it fails to compile.
          - platform: linux/amd64
            runs_on: ubuntu-latest
            arch_tag: amd64
          # - platform: linux/arm64
          #   runs_on: ubuntu-24.04-arm
          #   arch_tag: arm64
          # - platform: linux/ppc64le
          #   runs_on: ubuntu-latest
          #   arch_tag: ppc64le
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GitHub Packages
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container # compatible for caching to GHA/registry

      - name: Extract metadata (tags, labels) for Docker
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REPO_SLUG }}/${{ env.IMAGE_NAME }}
          tags: |
            # Image used in compose file
            type=raw,value=${{ (github.ref_name == 'main' && 'latest') || github.ref_name }}
            # In case we want to replicate a specific legacy setup
            type=sha,value=${{ github.sha }}-${{ matrix.arch_tag }}
          labels: |
            org.opencontainers.image.licenses=GPL-v3
            org.opencontainers.image.title=BON in a Box Conda Runner

      - name: Build and push Docker image per architecture
        id: push
        uses: docker/build-push-action@v7
        with:
          context: runners/conda
          file: runners/conda/conda-dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REPO_SLUG }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch_tag }}
          cache-to: type=registry,ref=${{ env.REPO_SLUG }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.arch_tag }},mode=max

  manifest:
    runs-on: ubuntu-latest
    needs: [build, prepare]
    env:
      REPO_SLUG: ${{ needs.prepare.outputs.repo_slug }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          TAG_MAIN="${{ github.ref_name == 'main' && 'latest' || github.ref_name }}"
          TAG_SHA="sha-${{ github.sha }}"
          BASE="${{ env.REPO_SLUG }}/${{ env.IMAGE_NAME }}"

          docker buildx imagetools create \
            -t "${BASE}:${TAG_MAIN}" \
            -t "${BASE}:${TAG_SHA}" \
            "${BASE}:${TAG_MAIN}-amd64" \
            "${BASE}:${TAG_MAIN}-arm64"
