name: Conda-CWL Runner

on:
  workflow_dispatch:
    # TODO : Change defaults when edge merged to main
    inputs:
      conda_runner_tag:
        description: 'BON in a Box Conda-CWL Runner tag to use'
        required: true
        default: &conda_runner_tag_default 'edge'
      server_branch:
        description: 'BON in a Box Server branch to use'
        required: true
        default: &server_branch_default 'cwl-export'
      pipelines_branch:
        description: 'BON in a Box Pipelines branch to use'
        required: true
        default: &pipelines_branch_default 'cwl-poc'
  push:
    branches:
      - main
      - edge
      - '*staging'
    paths:
      - '.github/workflows/docker_runner-cwl.yml'
      - 'runners/cwl/conda-cwl-dockerfile'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/runner-conda-cwl
  DEFAULT_CONDA_RUNNER_TAG: *conda_runner_tag_default
  DEFAULT_SERVER_BRANCH: *server_branch_default
  DEFAULT_PIPELINES_BRANCH: *pipelines_branch_default

jobs:
  runner-conda-cwl:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GitHub Packages
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          tags: |
            # Image used in compose file
            type=raw,value=${{ (github.ref_name == 'main' && 'latest') || github.ref_name }}
            type=sha,value=${{ github.sha }}
          labels: |
            org.opencontainers.image.licenses=GPL-v3
            org.opencontainers.image.title=BON in a Box Conda-CWL Runner

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: runners/cwl
          file: runners/cwl/conda-cwl-dockerfile
          push: true
          build-args: |
            CONDA_RUNNER_TAG=${{ github.event.inputs.conda_runner_tag || env.DEFAULT_CONDA_RUNNER_TAG }}
            SERVER_BRANCH=${{ github.event.inputs.server_branch || env.DEFAULT_SERVER_BRANCH }}
            PIPELINES_BRANCH=${{ github.event.inputs.pipelines_branch || env.DEFAULT_PIPELINES_BRANCH }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true